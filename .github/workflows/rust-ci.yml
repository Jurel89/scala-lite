name: rust-ci

on:
  pull_request:
    paths:
      - "native/scala-lite-engine/**"
  push:
    branches: [main]
    paths:
      - "native/scala-lite-engine/**"

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      
      - run: cargo fmt --manifest-path native/scala-lite-engine/Cargo.toml --all -- --check
      
      - run: cargo clippy --manifest-path native/scala-lite-engine/Cargo.toml --all-targets -- -D warnings
      
      - run: cargo test --manifest-path native/scala-lite-engine/Cargo.toml --all

name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  node-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      
      - run: npm ci
      
      - run: npm run typecheck
      
      - run: npm run lint
      
      - run: npm test
      
      - run: npx @vscode/vsce package --no-dependencies

      - name: Smoke test (headless activation)
        run: xvfb-run -a npm run test:smoke
